version: "3.9"

services:
  backend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/agentforge-backend:latest
    restart: always
    ports:
      - "8000:8000"
    env_file: .env.prod
    environment:
      ENVIRONMENT: production
      DEBUG: "false"

  frontend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/agentforge-frontend:latest
    restart: always
    ports:
      - "3000:3000"
    env_file: ./frontend/.env.prod
    depends_on:
      - backend
